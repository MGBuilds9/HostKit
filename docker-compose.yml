version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hostkit
      POSTGRES_USER: hostkit
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - hostkit_pgdata:/var/lib/postgresql/data
    networks:
      - hostkit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostkit"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://hostkit:${DB_PASSWORD}@db:5432/hostkit
      NEXTAUTH_URL: https://hostkit.mkgbuilds.com
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3100:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hostkit
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  cron:
    image: alpine:3.19
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
      APP_URL: http://app:3000
    depends_on:
      app:
        condition: service_healthy
    networks:
      - hostkit
    command: >
      sh -c "echo '*/15 * * * * wget -q -O- --header=\"Authorization: Bearer '\"$$CRON_SECRET\"'\" '\"$$APP_URL\"'/api/cron/sync-calendars > /proc/1/fd/1 2>&1' | crontab - && crond -f -l 2"

volumes:
  hostkit_pgdata:

networks:
  hostkit:
