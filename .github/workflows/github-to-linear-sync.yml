name: GitHub to Linear Sync

on:
  push:
    branches:
      - '**'

jobs:
  create-linear-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Determine commit type
        id: commit-type
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -qiE '^fix|^bug|^hotfix|^patch'; then
            echo "type=Fix" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qiE '^feat|^feature|^add|^new'; then
            echo "type=Feature" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qiE '^refactor|^refact|^rework|^redesign'; then
            echo "type=Refactor" >> "$GITHUB_OUTPUT"
          else
            echo "type=Update" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Linear issue
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          COMMIT_TYPE: ${{ steps.commit-type.outputs.type }}
          COMMIT_SHA: ${{ github.event.head_commit.id }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REPO_NAME: ${{ github.event.repository.name }}
          AUTHOR: ${{ github.event.head_commit.author.username }}
          BRANCH: ${{ github.ref_name }}
        run: |
          TITLE="Audit: ${REPO_NAME} - ${COMMIT_TYPE}"

          DESCRIPTION=$(jq -n \
            --arg sha "$COMMIT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg repo "$REPO_NAME" \
            --arg author "$AUTHOR" \
            --arg branch "$BRANCH" \
            '"- Commit SHA: \($sha)\n- Commit Message: \($msg)\n- Repository: \($repo)\n- Author: \($author)\n- Branch: \($branch)"')

          TEAM_ID="f5308d1f-43a5-474c-9ce3-5be155cb0be1"
          LABEL1="9f879fca-2940-471b-838e-07ae9239cca7"
          LABEL2="ceeb80ae-ce90-4c88-8214-e8a3b067cf19"
          PRIORITY=3

          JSON_PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESCRIPTION" \
            --arg teamId "$TEAM_ID" \
            --arg label1 "$LABEL1" \
            --arg label2 "$LABEL2" \
            --argjson priority "$PRIORITY" \
            '{
              query: "mutation IssueCreate($input: IssueCreateInput!) { issueCreate(input: $input) { issue { id title } } }",
              variables: {
                input: {
                  title: $title,
                  description: $desc,
                  teamId: $teamId,
                  priority: $priority,
                  labelIds: [$label1, $label2]
                }
              }
            }')

          curl -s -X POST "https://api.linear.app/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "$JSON_PAYLOAD"
