<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#0F172A"/>
  <!-- House-H: two vertical bars (walls) + crossbar (floor) + roof triangle -->
  <g fill="none" stroke="#D4726A" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left wall -->
    <line x1="168" y1="180" x2="168" y2="400"/>
    <!-- Right wall -->
    <line x1="344" y1="180" x2="344" y2="400"/>
    <!-- Crossbar (connects the H) -->
    <line x1="168" y1="290" x2="344" y2="290"/>
    <!-- Roof -->
    <polyline points="120,200 256,110 392,200"/>
  </g>
</svg>
