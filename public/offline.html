<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HostKit — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F172A;
      --surface: #1E293B;
      --border: #334155;
      --text: #F1F5F9;
      --muted: #94A3B8;
      --accent: #6366F1;
      --accent-hover: #4F46E5;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100dvh;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .wifi-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      color: var(--muted);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    button {
      display: inline-block;
      padding: 11px 28px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:active {
      opacity: 0.9;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--border);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <!-- Simple house icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </div>
      <span class="logo-name">HostKit</span>
    </div>

    <!-- Wifi off icon -->
    <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="2" y1="2" x2="22" y2="22"/>
      <path d="M10.72 5.08A10.94 10.94 0 0 1 12 5c4.2 0 8.03 1.78 10.74 4.64"/>
      <path d="M5 10.5A10.95 10.95 0 0 1 7.83 8.5"/>
      <path d="M10.71 10.73A6.98 6.98 0 0 1 12 10.5c2.29 0 4.32.97 5.77 2.52"/>
      <path d="M6.5 13a6.98 6.98 0 0 1 1.85-1.55"/>
      <path d="M14 15a2 2 0 0 0-4 0"/>
      <circle cx="12" cy="20" r="1" fill="currentColor"/>
    </svg>

    <h1>You&rsquo;re offline</h1>
    <p>Your tasks will sync when you&rsquo;re back online. Check your connection and try again.</p>

    <button onclick="location.reload()">Try Again</button>

    <p class="footer">HostKit &mdash; Cleaner Portal</p>
  </div>
</body>
</html>
